name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.18.0
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm tsc:check
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm lint:format
      - name: Build
        run: pnpm build
      - name: Check bundle size
        run: node scripts/check-bundle-size.js
      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const bundleData = JSON.parse(process.env.BUNDLE_JSON || '{"total":0,"totalLimit":3500,"chunks":[]}');
            const commentMarker = '<!-- bundle-size-report -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Sort chunks by size descending
            const sortedChunks = [...bundleData.chunks].sort((a, b) => b.size - a.size);

            // Build table rows
            const tableRows = sortedChunks.map(chunk => {
              const status = chunk.size > chunk.limit ? '❌' : '✅';
              const percent = Math.round((chunk.size / chunk.limit) * 100);
              return `| ${chunk.name} | ${chunk.size}KB | ${chunk.limit}KB | ${percent}% | ${status} |`;
            }).join('\n');

            // Calculate overall status
            const hasViolation = sortedChunks.some(c => c.size > c.limit);
            const totalExceeded = bundleData.total > bundleData.totalLimit;
            const overallStatus = (hasViolation || totalExceeded) ? '❌ Exceeds limit' : '✅ Within limit';

            const comment = [
              commentMarker,
              '## Bundle Size Report 📦',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Total Size** | ${bundleData.total}KB |`,
              `| **Total Limit** | ${bundleData.totalLimit}KB |`,
              `| **Status** | ${overallStatus} |`,
              '',
              '<details>',
              '<summary>Chunk Breakdown</summary>',
              '',
              '| Chunk | Size | Limit | Used | Status |',
              '|-------|------|-------|------|--------|',
              tableRows,
              '',
              '</details>',
              '',
              `[View workflow run](${runUrl})`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existingComment = comments.find(c => c.body && c.body.includes(commentMarker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              console.log(`Updated existing comment ${existingComment.id}`);
            } else {
              const { data: newComment } = await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              console.log(`Created new comment ${newComment.id}`);
            }

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.18.0
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run unit tests with coverage
        run: pnpm test:coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.18.0
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run integration tests
        env:
          CI: true
        run: pnpm test:integration:mcp-server

  agent-loop-tests:
    name: Agent Loop Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.18.0
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run agent loop integration tests (VCR playback)
        env:
          CI: true
        run: pnpm test:integration:agent-loop:playback

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.18.0
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.18.0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run e2e tests
        env:
          CI: true
        run: pnpm test:e2e
